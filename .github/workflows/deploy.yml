name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          APP_URL: ${{ secrets.DEPLOY_APP_URL }}
        run: |
          set -e
          mkdir -p ~/.ssh
          # Support both raw PEM and base64-encoded key
          if echo "$SSH_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_KEY" | tr -d '\n\r' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || {
              echo "ERROR: Invalid key. Use either:"
              echo "  1) Raw PEM: paste full key (-----BEGIN ... -----END-----)"
              echo "  2) Base64:  cat ~/.ssh/id_rsa | base64 -w 0  (Linux, no line breaks)"
              exit 1
            }
          fi
          chmod 600 ~/.ssh/deploy_key

          # Validate key format
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "ERROR: Key file invalid or passphrase-protected. Use an unencrypted key."
            exit 1
          fi

          # Run deployment commands on remote server
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            -p ${{ secrets.CPANEL_SSH_PORT }} \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} "set -e && cd ${{ secrets.DEPLOY_PATH }} && \
            echo '=== Pulling latest code ===' && git fetch origin main && git reset --hard origin/main && \
            ([ -f .env ] || (cp .env.example .env && php artisan key:generate --force)) && \
            (grep -q 'APP_KEY=base64:' .env || php artisan key:generate --force) && \
            ([ -z \"${{ secrets.DEPLOY_APP_URL }}\" ] || (sed -i 's|APP_URL=.*|APP_URL=${{ secrets.DEPLOY_APP_URL }}|' .env || true)) && \
            echo '=== Installing dependencies ===' && \
            (command -v composer >/dev/null 2>&1 && composer install --no-dev --optimize-autoloader --no-interaction || \
            (curl -sS https://getcomposer.org/installer | php -d allow_url_fopen=On -- --install-dir=. --filename=composer.phar && php -d allow_url_fopen=On composer.phar install --no-dev --optimize-autoloader --no-interaction)) && \
            echo '=== Setting permissions ===' && chmod -R 775 storage bootstrap/cache && \
            echo '=== Running migrations ===' && php artisan migrate --force && \
            echo '=== Rebuilding caches ===' && php artisan config:clear && php artisan cache:clear && \
            php artisan config:cache && php artisan route:cache && php artisan view:cache && \
            echo '=== Deployment complete ==='"
